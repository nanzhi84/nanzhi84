<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300" fill="none" role="img" aria-label="Activity overview: 89% Commits, 9% Pull requests, 1% Code review, 1% Issues">
  <style>
    .pct  { font: 700 14px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; fill: #c9d1d9; }
    .lbl  { font: 400 11px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; fill: #8b949e; }
  </style>

  <!-- card -->
  <rect x="0.5" y="0.5" width="479" height="299" rx="6" fill="#0d1117" stroke="#21262d"/>

  <!-- axes -->
  <g stroke="#30363d" stroke-width="1.5">
    <line x1="240" y1="58"  x2="240" y2="242"/>
    <line x1="148" y1="150" x2="332" y2="150"/>
  </g>

  <!-- activity polygon (top=Code review, right=Issues, bottom=Pull requests, left=Commits) -->
  <polygon points="240,148.97 241.03,150 240,159.30 148,150"
           fill="#9be000" fill-opacity="0.18" stroke="#9be000" stroke-width="2" stroke-linejoin="round"/>

  <!-- vertices -->
  <g fill="#0d1117" stroke="#9be000" stroke-width="1.8">
    <circle cx="148"    cy="150"    r="3.6"/>
    <circle cx="240"    cy="159.30" r="3.2"/>
    <circle cx="240"    cy="148.97" r="3.2"/>
    <circle cx="241.03" cy="150"    r="3.2"/>
  </g>
  <circle cx="240" cy="150" r="1.6" fill="#9be000"/>

  <!-- Code review (top) -->
  <text class="pct" x="240" y="32" text-anchor="middle">1%</text>
  <text class="lbl" x="240" y="48" text-anchor="middle">Code review</text>

  <!-- Issues (right) -->
  <text class="pct" x="342" y="146" text-anchor="start">1%</text>
  <text class="lbl" x="342" y="162" text-anchor="start">Issues</text>

  <!-- Pull requests (bottom) -->
  <text class="pct" x="240" y="266" text-anchor="middle">9%</text>
  <text class="lbl" x="240" y="282" text-anchor="middle">Pull requests</text>

  <!-- Commits (left) -->
  <text class="pct" x="138" y="146" text-anchor="end">89%</text>
  <text class="lbl" x="138" y="162" text-anchor="end">Commits</text>
</svg>
